<!DOCTYPE html>
<html>
<body>
<script src="https://js.puter.com/v2/"></script>
<script>
    async function testPuter() {
        console.log("Iniciando prueba de Puter.js...");
        try {
            const resp = await puter.ai.chat("Describe esta imagen: https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png");

        } catch (e) {

        }
    }
    testPuter();
</script>
