<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIV Lite — Extractor de Identidad</title>
    
    <!-- Librerías Modernas y Estables (Funcionan desde Archivo Local) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --secondary: #ec4899;
            --text: #f1f5f9;
            --dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center; justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), 
                radial-gradient(at 100% 100%, #4c1d95 0, transparent 50%);
        }
        .app-card {
            width: 100%; max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }
        
        h1 {
            font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 6px;
            background: linear-gradient(to right, #a5b4fc, #f9a8d4);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { text-align: center; color: var(--dim); font-size: 0.9rem; margin-bottom: 35px; }

        /* Arreglo para el error de ventana dividida */
        .upload-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }
        .upload-area {
            display: block;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.02);
            width: 100%;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }
        .upload-area p { font-size: 1rem; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .upload-area span { font-size: 0.8rem; color: var(--dim); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            display: none;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.5); }

        /* Loader */
        #loader { display: none; text-align: center; margin: 30px 0; }
        .spinner {
            width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { font-weight: 500; font-size: 0.85rem; color: #a5b4fc; }

        /* Results */
        #results { display: none; margin-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
        .data-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .label { font-size: 0.65rem; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
        .value { font-size: 1.25rem; font-weight: 700; color: #fff; }
        .cc-val { color: #818cf8; font-family: 'Monaco', monospace; font-size: 1.5rem; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>SIV Lite</h1>
    <p class="tagline">Verificación Inteligente de Identidad</p>

    <div id="mainUI">
        <label class="label">1. Documento Identidad (Obligatorio)</label>
        <div class="upload-container">
            <label for="idFile" class="upload-area" id="dropZoneID">
                <p id="idFileName">🪪 Subir Cédula</p>
                <span>Solo el frente del documento</span>
                <input type="file" id="idFile" accept="image/*,application/pdf">
            </label>
        </div>

        <label class="label">2. Documentos de Soporte (Opcional)</label>
        <div class="upload-container">
            <label for="supportFiles" class="upload-area" id="dropZoneSupport">
                <p id="supportFileNames">📂 Subir otros archivos</p>
                <span>Facturas, contratos, certificados...</span>
                <input type="file" id="supportFiles" accept="image/*,application/pdf" multiple>
            </label>
        </div>

        <button id="extractBtn" class="btn">🛡️ Iniciar Verificación</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Iniciando motor híbrido...</p>
    </div>

    <div id="results">
        <div id="verdictBadge" style="text-align: center; margin-bottom: 30px; padding: 15px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; display: none;"></div>
        
        <div class="data-card">
            <p class="label">Datos del Titular (Extraídos)</p>
            <p id="resFullName" class="value" style="font-size: 1.1rem; margin-bottom: 5px;">—</p>
            <p id="resCC" class="cc-val">—</p>
        </div>

        <div id="supportResultsList"></div>

        <button onclick="location.reload()" class="btn" style="display: block; background: rgba(255,255,255,0.05); color: var(--dim); box-shadow: none; font-size: 0.9rem;">🔄 Nueva Verificación</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const idFile = document.getElementById('idFile');
    const supportFiles = document.getElementById('supportFiles');
    const extractBtn = document.getElementById('extractBtn');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const mainUI = document.getElementById('mainUI');
    
    let selectedID = null;
    let selectedSupport = [];

    idFile.onchange = (e) => {
        selectedID = e.target.files[0];
        if (selectedID) {
            document.getElementById('idFileName').textContent = `✅ ${selectedID.name}`;
            checkReady();
        }
    };

    supportFiles.onchange = (e) => {
        selectedSupport = Array.from(e.target.files);
        if (selectedSupport.length > 0) {
            document.getElementById('supportFileNames').textContent = `✅ ${selectedSupport.length} archivos cargados`;
        }
    };

    function checkReady() {
        if (selectedID) extractBtn.style.display = 'block';
    }

    extractBtn.onclick = async () => {
        mainUI.style.display = 'none';
        loader.style.display = 'block';
        
        try {
            // FASE 1: EXTRAER DATOS CÉDULA
            status.textContent = "Analizando Cédula (Fase 1/2)...";
            let idImg = selectedID.type === 'application/pdf' ? await convertPdfToImage(selectedID) : await processImageFile(selectedID);
            
            const idOCR = await Tesseract.recognize(idImg, 'spa');
            const idData = await cleanIDData(idOCR.data.text);
            
            console.log("Datos Titular:", idData);

            // FASE 2: VERIFICAR SOPORTES
            const verifications = [];
            for (let i = 0; i < selectedSupport.length; i++) {
                const file = selectedSupport[i];
                status.textContent = `Verificando Soporte ${i+1}/${selectedSupport.length}...`;
                
                let sImg = file.type === 'application/pdf' ? await convertPdfToImage(file) : await processImageFile(file);
                const sOCR = await Tesseract.recognize(sImg, 'spa');
                
                const match = await verifyMatch(idData, sOCR.data.text, file.name);
                verifications.push(match);
            }

            renderFinalReport(idData, verifications);

        } catch (err) {
            console.error(err);
            alert("Error en la verificación. Intenta con imágenes más legibles.");
            location.reload();
        }
    };

    async function cleanIDData(rawText) {
        const prompt = `Analiza este texto OCR de una Cédula Colombiana. 
        OBJETIVO: Extraer datos del TITULAR con precisión absoluta y COMPLETOS.
        
        TEXTO OCR: "${rawText}"
        
        REGLAS DE ORO:
        1. NOMBRES COMPLETOS: Extrae TODOS los nombres de pila del titular (ej: si es "MIYER ANDREY", pon ambos). No omitas ninguno.
        2. APELLIDOS COMPLETOS: Extrae ambos apellidos del titular.
        3. ORDEN: Respeta estrictamente el orden del documento.
        4. LIMPIEZA: Elimina ruidos como letras sueltas (ej: "ANDREY E" -> "ANDREY") y nombres de registradores.
        
        Responde estrictamente en JSON:
        {"nombres": "...", "apellidos": "...", "cedula": "..."}`;
        
        const resp = await callAI(prompt);
        return parseCleanJSON(resp);
    }

    async function verifyMatch(idData, supportText, fileName) {
        const prompt = `ESTUDIA si los datos del titular coinciden con el documento adjunto.
        TITULAR ESTIMADO: ${idData.nombres} ${idData.apellidos}, CC: ${idData.cedula}
        TEXTO DEL DOCUMENTO A VERIFICAR (${fileName}): "${supportText}"
        
        CRITERIOS:
        - Si el nombre/apellido coincide (aunque falte un segundo nombre), marca matched: true pero menciona la duda en reason.
        - Si la cédula coincide, es un match fuerte.
        - Si no hay ninguna coincidencia clara, matched: false.
        
        Responde en JSON:
        {"matched": boolean, "reason": "breve explicación de la decisión", "dataFound": "qué fragmentos de nombre/CC encontraste"}`;
        
        const resp = await callAI(prompt);
        const result = parseCleanJSON(resp);
        result.fileName = fileName;
        return result;
    }

    async function callAI(prompt) {
        const aiResp = await fetch("https://text.pollinations.ai/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                messages: [{ role: "user", content: prompt }],
                model: "openai",
                jsonMode: true
            })
        });
        return await aiResp.text();
    }

    function renderFinalReport(idData, verifications) {
        loader.style.display = 'none';
        results.style.display = 'block';
        
        document.getElementById('resFullName').textContent = `${idData.nombres} ${idData.apellidos}`.toUpperCase();
        document.getElementById('resCC').textContent = formatDots(idData.cedula);
        
        const list = document.getElementById('supportResultsList');
        list.innerHTML = `<p class="label" style="margin-top: 20px;">Análisis de Documentos (${verifications.length})</p>`;
        
        let allMatched = verifications.length > 0;
        let doubts = false;

        verifications.forEach(v => {
            if (!v.matched) allMatched = false;
            if (v.matched && v.reason.toLowerCase().includes("duda")) doubts = true;

            const div = document.createElement('div');
            div.className = 'data-card';
            div.style.borderLeft = v.matched ? '4px solid #10b981' : '4px solid #ef4444';
            div.innerHTML = `
                <p style="font-size: 0.8rem; font-weight: 700; color: ${v.matched ? '#10b981' : '#f87171'}">${v.fileName}</p>
                <p style="font-size: 0.9rem; margin-top: 5px;">${v.reason}</p>
                <p style="font-size: 0.75rem; color: var(--dim); margin-top: 4px;">Datos: ${v.dataFound}</p>
            `;
            list.appendChild(div);
        });

        const badge = document.getElementById('verdictBadge');
        badge.style.display = 'block';
        if (selectedSupport.length === 0) {
            badge.textContent = "ID EXTRAÍDA";
            badge.style.background = "rgba(99, 102, 241, 0.2)";
            badge.style.color = "#818cf8";
        } else if (allMatched && !doubts) {
            badge.textContent = "✅ APROBADO";
            badge.style.background = "rgba(16, 185, 129, 0.2)";
            badge.style.color = "#10b981";
        } else if (!allMatched) {
            badge.textContent = "❌ RECHAZADO";
            badge.style.background = "rgba(239, 68, 68, 0.2)";
            badge.style.color = "#f87171";
        } else {
            badge.textContent = "⚠️ REVISIÓN HUMANA";
            badge.style.background = "rgba(245, 158, 11, 0.2)";
            badge.style.color = "#f59e0b";
        }
    }

    async function convertPdfToImage(file) {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.5 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        applyImageFilters(ctx, canvas);
        return canvas.toDataURL('image/jpeg', 0.95);
    }

    // Nueva función para mejorar la calidad de la imagen antes del OCR
    function applyImageFilters(ctx, canvas) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            // Convertir a escala de grises
            const avg = (data[i] + data[i+1] + data[i+2]) / 3;
            
            // Aumentar contraste (umbral simple)
            const contrast = 1.2;
            let val = avg;
            val = ((val / 255 - 0.5) * contrast + 0.5) * 255;
            val = Math.max(0, Math.min(255, val));
            
            data[i] = data[i+1] = data[i+2] = val;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    // Ajustamos la carga de imagen normal para que también pase por filtros
    async function processImageFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    applyImageFilters(ctx, canvas);
                    resolve(canvas.toDataURL('image/jpeg', 0.95));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function parseCleanJSON(text) {
        try {
            const clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
            const start = clean.indexOf('{');
            const end = clean.lastIndexOf('}');
            if (start === -1) return {};
            return JSON.parse(clean.substring(start, end + 1));
        } catch (e) { return {}; }
    }

    function renderResults(data) {
        document.getElementById('resNames').textContent = (data.nombres || 'No detectado').toUpperCase();
        document.getElementById('resSurnames').textContent = (data.apellidos || 'No detectado').toUpperCase();
        document.getElementById('resCC').textContent = formatDots(data.cedula);
    }

    function formatDots(num) {
        if (!num) return '—';
        const digits = num.toString().replace(/\D/g, '');
        return digits.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
</script>

</body>
</html>
