<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIV Lite — Extractor de Identidad</title>
    
    <!-- Librerías Modernas y Estables (Locales) -->
    <script src="pdf.min.js"></script>
    <script src="tesseract.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Outfit';
            src: local('Segoe UI'), local('Arial');
        }
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --secondary: #ec4899;
            --text: #f1f5f9;
            --dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center; justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), 
                radial-gradient(at 100% 100%, #4c1d95 0, transparent 50%);
        }
        .app-card {
            width: 100%; max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }
        
        h1 {
            font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 6px;
            background: linear-gradient(to right, #a5b4fc, #f9a8d4);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tagline { text-align: center; color: var(--dim); font-size: 0.9rem; margin-bottom: 35px; }

        .upload-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }
        .upload-area {
            display: block;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.02);
            width: 100%;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }
        .upload-area p { font-size: 1rem; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .upload-area span { font-size: 0.8rem; color: var(--dim); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            display: none;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.5); }

        #loader { display: none; text-align: center; margin: 30px 0; }
        .spinner {
            width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { font-weight: 500; font-size: 0.85rem; color: #a5b4fc; }

        #results { display: none; margin-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
        .data-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .label { font-size: 0.65rem; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
        .value { font-size: 1.25rem; font-weight: 700; color: #fff; }
        .cc-val { color: #818cf8; font-family: 'Monaco', monospace; font-size: 1.5rem; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>SIV Lite</h1>
    <p class="tagline">Verificación Inteligente de Identidad</p>

    <div id="mainUI">
        <label class="label">Carga Inteligente de Documentos</label>
        <div class="upload-container">
            <label for="idFile" class="upload-area">
                <p id="fileNameDisplay">📂 Sube todos tus documentos aquí</p>
                <span>Cédula + Facturas, Contratos o Certificados</span>
                <input type="file" id="idFile" accept="image/*,application/pdf" multiple>
            </label>
        </div>
        <button id="extractBtn" class="btn">🚀 Iniciar Análisis Inteligente</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Iniciando motor inteligente...</p>
    </div>

    <div id="results">
        <div id="verdictBadge" style="text-align: center; margin-bottom: 30px; padding: 15px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; display: none;"></div>
        
        <div id="idDataCard" class="data-card" style="display: none;">
            <p class="label">Datos del Titular (Detectado)</p>
            <p id="resFullName" class="value" style="font-size: 1.1rem; margin-bottom: 5px;">—</p>
            <p id="resCC" class="cc-val">—</p>
        </div>

        <div id="supportResultsList"></div>

        <button id="reloadBtn" class="btn" style="display: block; background: rgba(255,255,255,0.05); color: var(--dim); box-shadow: none; font-size: 0.9rem;">🔄 Nueva Verificación</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
