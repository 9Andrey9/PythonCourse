<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Mountain — ID Verification Florida</title>
    
    <!-- Librerías Modernas y Estables (Locales) -->
    <script src="pdf.min.js"></script>
    <script src="tesseract.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Outfit';
            src: local('Segoe UI'), local('Arial');
        }
        :root {
            --bg: #e0f2fe; /* Light Sky Blue environment */
            --glass: #1C75BC; /* Iron Mountain Denim Primary */
            --border: rgba(255, 255, 255, 0.1);
            --primary: #ffffff; /* White for icons/accents on blue */
            --secondary: #ffffff; 
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center; justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, #bae6fd 0, transparent 50%), 
                radial-gradient(at 100% 100%, #7dd3fc 0, transparent 50%);
        }
        .app-card {
            width: 100%; max-width: 520px;
            background: var(--glass);
            border: none;
            border-radius: 4px; /* More angular corporate look like the image */
            padding: 60px 40px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.4s ease-out;
            position: relative;
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }
        
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .corp-logo {
            width: 280px;
            height: auto;
            margin-bottom: 25px;
        }
        h1 {
            display: none; /* Logo contains the text in the reference image */
        }
        .tagline { color: white; font-size: 0.85rem; font-weight: 500; text-align: center; margin-bottom: 0; opacity: 0.9; }

        .upload-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }
        .upload-area {
            display: block;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.05);
            width: 100%;
        }
        .upload-area:hover {
            background: rgba(255,255,255,0.1);
        }
        .upload-area p { font-size: 1rem; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .upload-area span { font-size: 0.8rem; color: rgba(255,255,255,0.7); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 8px;
            background: white;
            color: #1C75BC; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            margin-top: 20px;
            display: none;
        }
        .btn:hover { background: #f8fafc; transform: translateY(-1px); }

        #loader { display: none; text-align: center; margin: 30px 0; }
        .spinner {
            width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { font-weight: 500; font-size: 0.85rem; color: #a5b4fc; }

        #results { display: none; margin-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
        .data-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .label { font-size: 0.6rem; font-weight: 800; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .value { font-size: 1.2rem; font-weight: 700; color: #ffffff; }
        .cc-val { color: #ffffff; font-family: 'Monaco', monospace; font-size: 1.4rem; opacity: 0.9; }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand-header">
        <img src="logo.png" alt="Iron Mountain Logo" class="corp-logo">
        <h1>Identity Verification</h1>
        <p class="tagline">Florida Operations Division</p>
    </div>

    <div id="mainUI">
        <label class="label">Carga Inteligente de Documentos</label>
        <div class="upload-container">
            <label for="idFile" class="upload-area">
                <p id="fileNameDisplay">📂 Sube todos tus documentos aquí</p>
                <span>Cédula + Facturas, Contratos o Certificados</span>
                <input type="file" id="idFile" accept="image/*,application/pdf" multiple>
            </label>
        </div>
        <button id="extractBtn" class="btn">🚀 Iniciar Análisis Inteligente</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Iniciando motor inteligente...</p>
    </div>

    <div id="results">
        <div id="verdictBadge" style="text-align: center; margin-bottom: 30px; padding: 15px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; display: none;"></div>
        
        <div id="idDataCard" class="data-card" style="display: none;">
            <p class="label">Datos del Titular (Detectado)</p>
            <p id="resFullName" class="value" style="font-size: 1.1rem; margin-bottom: 5px;">—</p>
            <p id="resCC" class="cc-val">—</p>
        </div>

        <div id="supportResultsList"></div>

        <button id="reloadBtn" class="btn" style="display: block; background: #ffffff; border: 1px solid #bae6fd; color: #475569; box-shadow: none; font-size: 0.85rem; margin-top: 20px;">🔄 New Verification Session</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
